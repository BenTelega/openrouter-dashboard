kind = "web"
previewPath = "/"
title = "OpenRouter Dashboard"
version = "1.0.0"
id = "artifacts/openrouter-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18561

[services.development]
run = "pnpm --filter @workspace/openrouter-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/openrouter-dashboard", "run", "build" ]
publicDir = "artifacts/openrouter-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18561"
BASE_PATH = "/"
